		<script type="text/javascript">
			window.startLoading = function(loginType) {
				var loginDiv = document.getElementById("loginDiv");
				loginDiv.style.setProperty("display", "none");
				window.showInfoMessage(loginType + "_loading");
			}

			window.showLoginDiv = function() {
				var loginDiv = document.getElementById("loginDiv");
				loginDiv.style.setProperty("display", "block");
				window.hideInfoMessage();
			}

			window.showInfoMessage = function(reason, showEntryButton) {
				var text = '';
				var infoMessageDiv = document.getElementById("infoMessageDiv");
				infoMessageDiv.style.setProperty("display", "block");
				var desc = infoMessageDiv.querySelector(".desc");
				var tryAgainButton = infoMessageDiv.querySelector("#tryAgain");;

				if(reason == "facebook_loading") {
					text = 'Facebook account linkage<br/>is in progress.';
					desc.innerHTML = text;
					desc.style.setProperty("font-size", "22px");
				} else if(reason == "google_loading") {
					text = 'Google account linkage<br/>is in progress.';
					desc.innerHTML = text;
					desc.style.setProperty("font-size", "22px");
				} else if (reason == 'fbPopup') {
					text = 'Please accept the presented Facebook permissions to play.<br/>(Allow Pop-up Windows in Safari)';
					desc.innerHTML = text;
					desc.style.setProperty("font-size", "22px");
				} else if(reason == "iframeLoadFailed") {
					text = 'Please accept the presented Facebook permissions to play.<br/>(Allow Pop-up Windows in Safari)';
					desc.innerHTML = text;
					desc.style.setProperty("font-size", "22px");
				} else if(reason == "scriptLoadFailed") {
					text = 'Please accept the presented Facebook permissions to play.<br/>(Allow Pop-up Windows in Safari)';
					desc.innerHTML = text;
					desc.style.setProperty("font-size", "22px");
				}

				if(showEntryButton === true) {
					tryAgainButton.style.setProperty("display", "block");
				} else {
					tryAgainButton.style.setProperty("display", "none");
				}
			};

			window.hideInfoMessage = function() {
				var infoMessageDiv = document.getElementById("infoMessageDiv");
				infoMessageDiv.style.setProperty("display", "none");
			}

			function onClickEye(){
				if (event.target.previousElementSibling.attributes.type.value == "password") {
					event.target.previousElementSibling.attributes.type.value = "text";
					event.target.className = "bi bi-eye-slash-fill item";
				} else {
					event.target.previousElementSibling.attributes.type.value = "password";
					event.target.className = "bi bi-eye-fill item";
				}
			}

			function changeForm(formName) {
				$(".main").empty();
				$(".msgBox").empty();
				$(".forgotPassBox").empty();
				$(".bottomBox").empty();
				$("input").off('blur', formatCheck);
				switch(formName) {
					case "emailLogin":
						$(".btnBox").show();
						makeEmailLoginForm();
						break;
					case "EmailRegister":
						$(".btnBox").show();
						makeRegisterForm();
						break;
					default:
						$(".btnBox").hide();
						makeLoginBanner();
						break;
				}
			}

			function makeLoginBanner() {
				$(".main").html("<a href='#'' onclick='doLoginOrRegister(`login`,`facebook`); return false;'><img src='https://static.doubledowncasino2.com/login/continue_fb_new.png'></a>" +
				"<a href='#' onclick='doLoginOrRegister(`login`,`google`); return false;'><img src='https://static.doubledowncasino2.com/login/continue_fb_new.png'></a>" +
				"<a href='#' onclick='changeForm(`EmailRegister`); return false;'><img src='https://static.doubledowncasino2.com/login/continue_fb_new.png'></a>");
			}

			function makeEmailLoginForm() {
				setTextField(".msgBox", "Log into Doubledown casino with Your Email & password.");
				var mainContainer = $(".main");
				var loginInput = makeInputBox("login");
				loginInput.id ="emailID";
				loginInput.placeholder ="Enter Email";

				mainContainer.append(loginInput);

				var passwrodInput = makeInputBox("password");
				passwrodInput.placeholder ="Enter Password";
				passwrodInput.id ="pw";
				mainContainer.append(passwrodInput);
				mainContainer.append(makeEyeIcon());

				setTextField(".forgotPassBox", '<a href="https://doubledowncasino1.zendesk.com/hc/en-us" >Forgot password?');
				setTextField(".bottomBox", 'New user? <a href="#" onclick="changeForm(`EmailRegister`); return false;">REGISTER NOW');
				$('#nextBtn').attr('onClick', 'doLoginOrRegister("login", "email")');
				$("input").on('blur', formatCheck);
			}

			function makeRegisterForm() {
				setTextField(".msgBox", "Register for DoubleDown Casino");
				var mainContainer = $(".main");
				var loginInput = makeInputBox("login");
				loginInput.id ="emailID";
				loginInput.placeholder ="Enter Email";

				mainContainer.append(loginInput);

				var passwrodInput = makeInputBox("password");
				passwrodInput.placeholder ="Enter Password";
				passwrodInput.id ="pw";
				mainContainer.append(passwrodInput);
				mainContainer.append(makeEyeIcon());

				var verifyPassInput = makeInputBox("password");
				verifyPassInput.placeholder ="Verify Password";
				verifyPassInput.id ="verifyPw";
				mainContainer.append(verifyPassInput);
				mainContainer.append(makeEyeIcon());


				setTextField(".bottomBox", 'Already registerd? <a href="#" onclick="changeForm(`emailLogin`); return false;">LOG IN');

				$('#nextBtn').attr('onClick', 'doRegister()');
				$("input").on('blur', formatCheck);
			}

			function makeInputBox(type){
				var input = document.createElement("input");
				input.className = "item";
				if (type == "password") {
					input.type = "password";
				} else {
					input.type = "text";
				}

				return input;
			}

			function makeEyeIcon() {
				var icon = document.createElement("i");
				icon.className = "bi bi-eye-fill item";
				icon.onclick = onClickEye;

				return icon;
			}

			function setTextField(clsName, text) {
				$(clsName).html(text);
			}

			function formatCheck() {
				var email = $('#emailID').val();
				var pw = $('#pw').val();
				var verifyPw = $('#verifyPw').val();

				if (verifyPw == undefined){
					verifyPw = pw;
				}

				if (email == "" && pw == "" && verifyPw == "") {
					//setTextField(".msgBox", "Register for DoubleDown Casino");
					return false;
				}

				if (email.indexOf("gmail.com") > -1) {
					setTextField(".msgBox", `Please use “Sign in with Google" for Gmail.`);
					return false;
				}

				if (validateEmail(email) == false) {
					setTextField(".msgBox", `Requires correct email.`);
					return false;
				}

				if(pw =="" && verifyPw == "") {
					return false;
				}

				if (pw.length < 6 || verifyPw.length < 6) {
					setTextField(".msgBox", `The password is not in the correct format.`);
					return false;
				}

				if (pw != verifyPw) {
					setTextField(".msgBox", `Check Your password.`);
					return false;
				}

				setTextField(".msgBox", "Register for DoubleDown Casino");
				return true;
			}

			function validateEmail(email) {
				var re = /^([\w-]+(?:\.[\w-]+)*)@((?:[\w-]+\.)*\w[\w-]{0,66})\.([a-z]{2,6}(?:\.[a-z]{2})?)$/i;
				return re.test(email);
			}
